<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BAAN PAI MAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Anuphan', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">

    <nav class="bg-white border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="font-black text-[oklch(47.6%_0.114_61.907)]">ADMIN BAAN PAI MAI</div>
            <a href="index.html" class="text-sm text-stone-500 hover:text-stone-800 font-medium">ไปที่หน้าเว็บหลัก</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-10">
        <header class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-stone-900">รายการจองรถจี๊ป</h1>
                <p class="text-stone-500">จัดการข้อมูลลูกค้าและการจองทั้งหมด (Real-time)</p>
            </div>
            <div class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-stone-100">
                <span class="text-stone-400 text-sm font-medium">ยอดจองทั้งหมด:</span>
                <span id="totalBookings" class="text-2xl font-bold text-[oklch(47.6%_0.114_61.907)] ml-2">0</span>
            </div>
        </header>

        <div class="bg-white rounded-[2rem] shadow-sm border border-stone-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-stone-50 border-b border-stone-100 text-stone-500 text-sm uppercase tracking-wider">
                            <th class="px-8 py-4 font-semibold">วัน/เวลาจอง</th>
                            <th class="px-8 py-4 font-semibold">ชื่อลูกค้า</th>
                            <th class="px-8 py-4 font-semibold">เบอร์โทรศัพท์</th>
                            <th class="px-8 py-4 font-semibold">สถานะ</th>
                            <th class="px-8 py-4 font-semibold text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="bookingList" class="divide-y divide-stone-50">
                        <tr>
                            <td colspan="5" class="px-8 py-20 text-center text-stone-400">กำลังโหลดข้อมูล...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


        const firebaseConfig = {
            apiKey: "AIzaSyBAAaq3mcI9Ui09gDTrSDhhTVd6aB0vqE0",
            authDomain: "baan-pai-mai-booking.firebaseapp.com",
            projectId: "baan-pai-mai-booking",
            storageBucket: "baan-pai-mai-booking.firebasestorage.app",
            messagingSenderId: "166783440073",
            appId: "1:166783440073:web:93a333245c2e334b026918",
            measurementId: "G-TKM51ZGWCB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);


        const q = query(collection(db, "bookings"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const listElement = document.getElementById('bookingList');
            document.getElementById('totalBookings').innerText = snapshot.size;
            
            if (snapshot.empty) {
                listElement.innerHTML = `<tr><td colspan="5" class="px-8 py-20 text-center text-stone-400">ยังไม่มีข้อมูลการจองในขณะนี้</td></tr>`;
                return;
            }

            let html = "";
            snapshot.forEach((docSnapshot) => {
                const data = docSnapshot.data();
                const id = docSnapshot.id;
                

                const isConfirmed = data.status === 'confirmed';
                const statusClass = isConfirmed ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700';
                const statusText = isConfirmed ? 'ยืนยันแล้ว' : 'รอตรวจสอบ';

                html += `
                    <tr class="hover:bg-stone-50/50 transition-colors">
                        <td class="px-8 py-5">
                            <div class="font-bold text-stone-800">${data.bookingDate}</div>
                            <div class="text-xs text-stone-400 font-medium">${data.bookingTime}</div>
                        </td>
                        <td class="px-8 py-5 font-semibold text-stone-700">${data.customerName}</td>
                        <td class="px-8 py-5 text-stone-500 font-mono">${data.telephone}</td>
                        <td class="px-8 py-5">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${statusClass}">
                                ${statusText}
                            </span>
                        </td>
                        <td class="px-8 py-5 text-right space-x-3">
                            <button onclick="updateStatus('${id}', '${data.status}')" class="text-xs font-bold ${isConfirmed ? 'text-stone-400' : 'text-blue-600 hover:text-blue-800'} transition-colors">
                                ${isConfirmed ? 'ยกเลิกยืนยัน' : 'กดยืนยัน'}
                            </button>
                            <button onclick="deleteBooking('${id}')" class="text-xs font-bold text-red-400 hover:text-red-600 transition-colors">ลบ</button>
                        </td>
                    </tr>
                `;
            });
            listElement.innerHTML = html;
        });


        window.deleteBooking = async (id) => {
            if(confirm('ยืนยันที่จะลบข้อมูลการจองนี้ใช่หรือไม่?')) {
                try {
                    await deleteDoc(doc(db, "bookings", id));
                } catch (e) { 
                    console.error("Delete Error:", e);
                    alert("ไม่สามารถลบข้อมูลได้ กรุณาเช็ค Permission ใน Firebase"); 
                }
            }
        };


        window.updateStatus = async (id, currentStatus) => {
            const newStatus = currentStatus === 'confirmed' ? 'pending' : 'confirmed';
            try {
                await updateDoc(doc(db, "bookings", id), { status: newStatus });
            } catch (e) { 
                console.error("Update Error:", e);
                alert("ไม่สามารถอัปเดตสถานะได้"); 
            }
        };
    </script>
</body>
</html>
